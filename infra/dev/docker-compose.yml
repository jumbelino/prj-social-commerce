services:
  postgres:
    image: postgres:16-alpine
    container_name: social-commerce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-social_commerce}
      POSTGRES_USER: ${POSTGRES_USER:-social_commerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-social_commerce}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-social_commerce} -d ${POSTGRES_DB:-social_commerce}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: social-commerce-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: social-commerce-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: social-commerce-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: dev-file
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import

  backend:
    build:
      context: ../../backend
    container_name: social-commerce-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-social_commerce}:${POSTGRES_PASSWORD:-social_commerce}@postgres:5432/${POSTGRES_DB:-social_commerce}
      OIDC_JWKS_URL: http://keycloak:8080/realms/social-commerce/protocol/openid-connect/certs
      OIDC_ISSUER: ${OIDC_ISSUER:-http://localhost:8080/realms/social-commerce}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-realm-management}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      MERCADO_PAGO_MOCK: ${MERCADO_PAGO_MOCK:-1}
      MERCADO_PAGO_MOCK_GET_STATUS: ${MERCADO_PAGO_MOCK_GET_STATUS:-approved}
      MERCADO_PAGO_ACCESS_TOKEN: ${MERCADO_PAGO_ACCESS_TOKEN:-replace-with-dev-token}
      MERCADO_PAGO_WEBHOOK_SECRET: ${MERCADO_PAGO_WEBHOOK_SECRET:-replace-with-dev-webhook-secret}
      MELHOR_ENVIO_BASE_URL: ${MELHOR_ENVIO_BASE_URL:-https://sandbox.melhorenvio.com.br}
      MELHOR_ENVIO_TOKEN: ${MELHOR_ENVIO_TOKEN:-replace-with-dev-token}
      SHIPPING_ORIGIN_POSTAL_CODE: ${SHIPPING_ORIGIN_POSTAL_CODE:-01018020}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-product-images}
      MINIO_PUBLIC_BASE_URL: ${MINIO_PUBLIC_BASE_URL:-http://localhost:9000/product-images}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

  frontend:
    build:
      context: ../../frontend
      args:
        NEXT_PUBLIC_OIDC_AUTHORITY: ${NEXT_PUBLIC_OIDC_AUTHORITY:-http://localhost:8080/realms/social-commerce}
        NEXT_PUBLIC_OIDC_CLIENT_ID: ${NEXT_PUBLIC_OIDC_CLIENT_ID:-social-commerce-frontend}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    container_name: social-commerce-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://backend:8000}
      NEXT_PUBLIC_OIDC_AUTHORITY: ${NEXT_PUBLIC_OIDC_AUTHORITY:-http://localhost:8080/realms/social-commerce}
      OIDC_INTERNAL_AUTHORITY: ${OIDC_INTERNAL_AUTHORITY:-http://keycloak:8080/realms/social-commerce}
      NEXT_PUBLIC_OIDC_CLIENT_ID: ${NEXT_PUBLIC_OIDC_CLIENT_ID:-social-commerce-frontend}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
      keycloak:
        condition: service_started

volumes:
  postgres_data:
  minio_data:
